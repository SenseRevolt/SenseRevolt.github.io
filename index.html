<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SenseRevolt | Something Meaningful is Coming</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400;700&family=Jost:wght@100;300;400&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Jost', sans-serif;
            background-color: #373635; /* Темний фон на всю сторінку */
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            padding: 40px 0;
            width: 100%;
        }

        /* --- ЛОГОТИП І ЛІНІЇ ПО БОКАХ --- */
        .logo-wrapper {
            display: flex;
            align-items: center;
            width: 100%;
            margin-bottom: 80px; /* Відступ до тексту */
        }

        .side-line {
            flex-grow: 1; /* Лінія тягнеться до абсолютних країв екрана */
            height: 1px;
            background-color: #ddcdb7;
            opacity: 0.3;
        }

        .logo {
            max-width: 436px;
            width: 100%;
            height: auto;
            padding: 0 40px; /* Відступ від ліній до самого логотипа */
        }

        /* --- ТЕКСТ --- */
        .main-title {
            font-family: 'El Messiri', sans-serif;
            font-weight: 400;
            font-size: 48px;
            color: #fbefdc;
            margin-bottom: 30px;
            text-align: center;
            padding: 0 20px;
        }

        .mobile-break {
            display: none;
        }

        .subtitle {
            font-family: 'Jost', sans-serif;
            font-weight: 300;
            font-size: 36px;
            color: #fbefdc;
            margin-bottom: 60px;
            text-align: center;
            padding: 0 20px;
        }

        /* --- ТАЙМЕР --- */
        .countdown-wrapper {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 15px;
            flex-wrap: nowrap;
            padding: 0 20px;
        }

        .time-block {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .box {
            border: 1px solid rgba(221, 205, 183, 0.3);
            border-radius: 4px;
            width: 100px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 12px;
        }

        .number {
            font-family: 'Jost', sans-serif;
            font-weight: 200;
            font-size: 56px;
            color: #ddcdb7;
            line-height: 1;
        }

        .label {
            font-family: 'Jost', sans-serif;
            font-weight: 300;
            font-size: 24px;
            color: #fbefdc;
        }

        .colon {
            font-family: 'Jost', sans-serif;
            font-weight: 200;
            font-size: 56px;
            color: #ddcdb7;
            line-height: 100px;
            margin: 0 -5px;
        }

        /* --- АДАПТИВ (Мобільні) --- */
        @media (max-width: 992px) {
            .mobile-break { display: block; }
            .main-title { line-height: 1.2; }
        }

        @media (max-width: 600px) {
            .logo {
                padding: 0 20px; /* На мобільному лінії підходять ближче до лого */
                max-width: 320px;
            }
            .logo-wrapper { margin-bottom: 50px; }
            .main-title { font-size: 36px; }
            .subtitle { font-size: 26px; margin-bottom: 40px;}
            
            .countdown-wrapper { gap: 6px; }
            .box { width: 65px; height: 65px; margin-bottom: 8px;}
            .number { font-size: 36px; }
            .colon { font-size: 36px; line-height: 65px; margin: 0; }
            .label { font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <!-- ЛОГОТИП З ЛІНІЯМИ ДО КРАЇВ -->
        <div class="logo-wrapper">
            <div class="side-line"></div>
            <img src="assets/Logo.svg" alt="SenseRevolt Logo" class="logo">
            <div class="side-line"></div>
        </div>
        
        <!-- ТЕКСТ -->
        <h1 class="main-title">Something Meaningful<br class="mobile-break"> is Coming</h1>
        <h2 class="subtitle">Launching in</h2>
        
        <!-- ТАЙМЕР -->
        <div class="countdown-wrapper">
            <div class="time-block">
                <div class="box"><span class="number" id="days">30</span></div>
                <span class="label">Days</span>
            </div>
            <span class="colon">:</span>
            <div class="time-block">
                <div class="box"><span class="number" id="hours">00</span></div>
                <span class="label">Hours</span>
            </div>
            <span class="colon">:</span>
            <div class="time-block">
                <div class="box"><span class="number" id="minutes">00</span></div>
                <span class="label">Min</span>
            </div>
            <span class="colon">:</span>
            <div class="time-block">
                <div class="box"><span class="number" id="seconds">00</span></div>
                <span class="label">Sec</span>
            </div>
        </div>

    </div>

    <!-- СКРИПТ ТАЙМЕРА -->
    <script>
        const launchDate = new Date("Jun 7, 2026 00:00:00").getTime();

        const timer = setInterval(function() {
            const now = new Date().getTime();
            const distance = launchDate - now;

            let days = Math.floor(distance / (1000 * 60 * 60 * 24));
            let hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            let minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            let seconds = Math.floor((distance % (1000 * 60)) / 1000);

            days = days < 10 ? "0" + days : days;
            hours = hours < 10 ? "0" + hours : hours;
            minutes = minutes < 10 ? "0" + minutes : minutes;
            seconds = seconds < 10 ? "0" + seconds : seconds;

            document.getElementById("days").innerText = days;
            document.getElementById("hours").innerText = hours;
            document.getElementById("minutes").innerText = minutes;
            document.getElementById("seconds").innerText = seconds;

            if (distance < 0) {
                clearInterval(timer);
                document.getElementById("days").innerText = "00";
                document.getElementById("hours").innerText = "00";
                document.getElementById("minutes").innerText = "00";
                document.getElementById("seconds").innerText = "00";
            }
        }, 1000);
    </script>
</body>
</html>
