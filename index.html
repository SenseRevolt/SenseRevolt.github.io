<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SenseRevolt | Something Meaningful is Coming</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400;600&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Jost', sans-serif;
            background-color: #f1f1f1;
            color: #373635;
            overflow-x: hidden;
        }

        /* --- ВЕРХНЯ ТЕМНА СЕКЦІЯ --- */
        .dark-section {
            background-color: #373635;
            text-align: center;
            padding: 60px 20px 220px 20px; /* Великий відступ для накладання банера */
            position: relative;
            z-index: 2;
        }

        .logo {
            max-width: 436px;
            width: 100%;
            height: auto;
            margin-bottom: 60px;
        }

        .main-title {
            font-family: 'El Messiri', sans-serif;
            font-weight: 400;
            font-size: 48px;
            color: #fbefdc;
            margin-bottom: 20px;
        }

        .subtitle {
            font-family: 'Jost', sans-serif;
            font-weight: 300;
            font-size: 36px;
            color: #fbefdc;
            margin-bottom: 50px;
        }

        /* --- ТАЙМЕР --- */
        .countdown-wrapper {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 15px;
        }

        .time-block {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .box {
            border: 1px solid rgba(221, 205, 183, 0.3);
            border-radius: 4px;
            width: 100px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 12px;
        }

        .number {
            font-family: 'Jost', sans-serif;
            font-weight: 200;
            font-size: 56px;
            color: #ddcdb7;
            line-height: 1;
        }

        .label {
            font-family: 'Jost', sans-serif;
            font-weight: 300;
            font-size: 24px;
            color: #fbefdc;
        }

        .colon {
            font-family: 'Jost', sans-serif;
            font-weight: 200;
            font-size: 56px;
            color: #ddcdb7;
            line-height: 100px;
            margin: 0 -5px;
        }

        /* --- НИЖНЯ СВІТЛА СЕКЦІЯ --- */
        .light-section {
            position: relative;
            background-color: #f1f1f1;
            min-height: 500px; /* Висота для форми та банера */
        }

        /* --- БАНЕР 1920px (Адаптивна обрізка) --- */
        .desktop-banner {
            position: absolute;
            top: -190px; /* Зсув вгору на темний фон */
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            min-width: 1100px; /* Тримаємо пропорцію книг при звуженні */
            max-width: 1920px; /* Оригінал макету */
            height: auto;
            object-fit: cover;
            object-position: center top;
            z-index: 3;
            pointer-events: none; /* Щоб не перекривати кліки по формі */
        }

        /* --- КОНТЕЙНЕР ФОРМИ --- */
        .container {
            position: relative;
            z-index: 4; /* Форма лежить поверх банера */
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 40px;
            display: flex;
            justify-content: flex-start; /* Форма чітко зліва */
        }

        .form-wrapper {
            width: 100%;
            max-width: 450px;
            padding-top: 80px;
            text-align: center;
        }

        .form-title {
            font-family: 'El Messiri', sans-serif;
            font-weight: 600;
            font-size: 36px;
            color: #373635;
            margin-bottom: 35px;
            line-height: 1.2;
        }

        .email-input {
            width: 100%;
            background-color: transparent;
            border: 1px solid #373635;
            border-radius: 50px;
            padding: 18px 30px;
            font-family: 'Jost', sans-serif;
            font-size: 16px;
            color: #373635;
            margin-bottom: 20px;
            outline: none;
            text-align: center;
        }
        
        .email-input::placeholder { color: #666; }

        .submit-btn {
            width: 100%;
            background-color: #373635;
            color: #d3c3af;
            border: none;
            border-radius: 50px;
            padding: 15px 30px;
            font-family: 'El Messiri', sans-serif;
            font-weight: 600;
            font-size: 26px;
            cursor: pointer;
            transition: opacity 0.3s ease;
            margin-bottom: 15px;
        }

        .submit-btn:hover { opacity: 0.9; }

        .spam-notice {
            font-family: 'Jost', sans-serif;
            font-size: 14px;
            color: #373635;
        }

        /* --- МОБІЛЬНІ КНИГИ (Приховані на ПК) --- */
        .mobile-books {
            display: none;
            width: 100%;
            max-width: 450px;
            margin: 40px auto 0;
            position: relative;
            z-index: 5;
        }

        /* --- АДАПТИВНІСТЬ --- */
        @media (max-width: 1200px) {
            .desktop-banner {
                object-position: 65% top; /* Плавне зміщення фокусу на книги при звуженні */
            }
        }

        @media (max-width: 992px) {
            .dark-section { padding-bottom: 80px; }
            .desktop-banner { display: none; } /* Вимикаємо довгий банер */
            .light-section { padding-bottom: 60px; min-height: auto; }
            .container { justify-content: center; padding: 0 20px; flex-direction: column; align-items: center; }
            .form-wrapper { padding-top: 40px; margin: 0 auto; }
            .mobile-books { display: block; } /* Вмикаємо книги знизу по центру */
        }

        @media (max-width: 600px) {
            .main-title { font-size: 32px; }
            .subtitle { font-size: 26px; margin-bottom: 30px;}
            .countdown-wrapper { gap: 6px; }
            .box { width: 65px; height: 65px; margin-bottom: 8px;}
            .number { font-size: 36px; }
            .colon { font-size: 36px; line-height: 65px; margin: 0; }
            .label { font-size: 14px; }
            .form-title { font-size: 28px; }
        }
    </style>
</head>
<body>

    <section class="dark-section">
        <img src="assets/Logo.svg" alt="SenseRevolt Logo" class="logo">
        
        <h1 class="main-title">Something Meaningful is Coming</h1>
        <h2 class="subtitle">Launching in</h2>
        
        <div class="countdown-wrapper">
            <div class="time-block">
                <div class="box"><span class="number" id="days">30</span></div>
                <span class="label">Days</span>
            </div>
            <span class="colon">:</span>
            <div class="time-block">
                <div class="box"><span class="number" id="hours">00</span></div>
                <span class="label">Hours</span>
            </div>
            <span class="colon">:</span>
            <div class="time-block">
                <div class="box"><span class="number" id="minutes">00</span></div>
                <span class="label">Min</span>
            </div>
            <span class="colon">:</span>
            <div class="time-block">
                <div class="box"><span class="number" id="seconds">00</span></div>
                <span class="label">Sec</span>
            </div>
        </div>
    </section>

    <section class="light-section">
        <!-- БАНЕР 1920px (Завантажте його як banner.png у папку assets) -->
        <img src="assets/banner.png" class="desktop-banner" alt="SenseRevolt Books Banner">

        <div class="container">
            <div class="form-wrapper">
                <h3 class="form-title">Be the First to Know<br>When We Launch</h3>
                <form action="#" method="POST">
                    <input type="email" class="email-input" placeholder="Your email address" required>
                    <button type="submit" class="submit-btn">Notify Me</button>
                </form>
                <p class="spam-notice">No spam. Ever. Unsubscribe anytime.</p>
            </div>
            
            <!-- КНИГИ ДЛЯ МОБІЛЬНОЇ ВЕРСІЇ (Використовується старий файл books.png) -->
            <img src="assets/books.png" class="mobile-books" alt="SenseRevolt Books">
        </div>
    </section>

    <script>
        const launchDate = new Date("Jun 7, 2026 00:00:00").getTime();

        const timer = setInterval(function() {
            const now = new Date().getTime();
            const distance = launchDate - now;

            let days = Math.floor(distance / (1000 * 60 * 60 * 24));
            let hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            let minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            let seconds = Math.floor((distance % (1000 * 60)) / 1000);

            days = days < 10 ? "0" + days : days;
            hours = hours < 10 ? "0" + hours : hours;
            minutes = minutes < 10 ? "0" + minutes : minutes;
            seconds = seconds < 10 ? "0" + seconds : seconds;

            document.getElementById("days").innerText = days;
            document.getElementById("hours").innerText = hours;
            document.getElementById("minutes").innerText = minutes;
            document.getElementById("seconds").innerText = seconds;

            if (distance < 0) {
                clearInterval(timer);
                document.getElementById("days").innerText = "00";
                document.getElementById("hours").innerText = "00";
                document.getElementById("minutes").innerText = "00";
                document.getElementById("seconds").innerText = "00";
            }
        }, 1000);
    </script>
</body>
</html>
