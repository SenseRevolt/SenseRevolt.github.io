<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SenseRevolt™ | Emotional Wellness Tools</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,300;0,400;0,500;0,600;0,700;0,900;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dark: #2b2f3a;
      --cream: #f0e8d8;
      --gold: #c9a96e;
      --gold-light: #e8d5b0;
      --mind-accent: #4a6fa5;
      --sel-accent: #e07b54;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Jost', sans-serif;
      background-color: var(--dark);
      color: var(--cream);
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 4rem;
      background: rgba(43, 47, 58, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(201, 169, 110, 0.15);
    }

    .nav-logo {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      text-decoration: none;
      transition: opacity 0.3s ease;
    }
    
    .nav-logo:hover {
      opacity: 0.7;
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--cream);
      text-decoration: none;
      opacity: 0.75;
      transition: opacity 0.2s;
    }

    .nav-links a:hover { opacity: 1; color: var(--gold); }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8rem 2rem 4rem;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 40%, rgba(201, 169, 110, 0.08) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 20% 80%, rgba(74, 111, 165, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 80% 20%, rgba(224, 123, 84, 0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    .hero-eyebrow {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.2s;
    }

    .hero-title {
      font-size: clamp(3rem, 8vw, 7rem);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.4s;
    }

    /* ПРАВКА: Тонкий шрифт, не курсив, малий TM */
    .hero-title .thin {
      font-style: normal;
      font-weight: 300;
      color: var(--gold);
    }
    
    .hero-title .tm {
      font-size: 0.25em;
      vertical-align: super;
      font-weight: 400;
      margin-left: 0.1em;
    }

    .hero-hook {
      font-size: clamp(1rem, 2vw, 1.2rem);
      font-weight: 300;
      line-height: 1.8;
      max-width: 720px;
      color: var(--gold-light);
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.6s;
      margin-bottom: 3rem;
    }

    .hero-hook strong {
      color: var(--cream);
      font-weight: 600;
    }

    .hero-buttons {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.8s;
      margin-bottom: 2.5rem;
    }

    .hero-btn {
      font-family: 'Jost', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.9rem 2rem;
      border-radius: 100px;
      text-decoration: none;
      transition: all 0.3s ease;
      display: inline-block;
    }

    .hero-btn-mind {
      background: rgba(74, 111, 165, 0.2);
      border: 1px solid rgba(74, 111, 165, 0.5);
      color: #7ba7d4;
    }

    .hero-btn-mind:hover {
      background: rgba(74, 111, 165, 0.35);
      border-color: rgba(74, 111, 165, 0.9);
      transform: translateY(-2px);
    }

    .hero-btn-sel {
      background: rgba(224, 123, 84, 0.2);
      border: 1px solid rgba(224, 123, 84, 0.5);
      color: #e8a07a;
    }

    .hero-btn-sel:hover {
      background: rgba(224, 123, 84, 0.35);
      border-color: rgba(224, 123, 84, 0.9);
      transform: translateY(-2px);
    }

    .scroll-hint {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.3s;
    }

    .scroll-hint span {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.4;
    }

    .scroll-line {
      width: 1px;
      height: 48px;
      background: linear-gradient(to bottom, var(--gold), transparent);
      animation: scrollPulse 2s ease infinite;
    }

    /* ── STORY ── */
    .story {
      padding: 7rem 2rem 4rem;
      max-width: 860px;
      margin: 0 auto;
      text-align: center;
    }

    .section-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.7;
      margin-bottom: 1.5rem;
    }

    .story h2 {
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 2rem;
      letter-spacing: -0.01em;
    }

    .story h2 em {
      font-style: italic;
      font-weight: 300;
      color: var(--gold);
    }

    .story p {
      font-size: 1.05rem;
      font-weight: 300;
      line-height: 1.85;
      color: var(--gold-light);
      margin-bottom: 1.5rem;
      opacity: 0.9;
    }

    .story p strong {
      color: var(--cream);
      font-weight: 500;
    }

    /* ── TWO VOICES ── */
    .two-voices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      max-width: 860px;
      margin: 3rem auto 6rem;
      padding: 0 2rem;
    }

    .voice {
      padding: 2.5rem;
      border-top: 1px solid rgba(201, 169, 110, 0.12);
    }

    .voice-mind { border-right: 1px solid rgba(201, 169, 110, 0.12); }

    .voice-name {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    .voice-mind .voice-name { color: #7ba7d4; }
    .voice-sel .voice-name  { color: #e8a07a; }

    .voice h3 {
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 0.75rem;
