<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SenseRevolt — Something Meaningful is Coming</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400;600&family=Jost:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: 'Jost', sans-serif;
      background: #373635;
      color: #fbefdc;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    header {
      max-width: 1440px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 2rem 28px;
      border-bottom: 1px solid rgba(255,255,255,0.12);
    }

    .logo img {
      width: 436px;
      max-width: 90vw;
      height: auto;
      display: block;
    }

    .tagline {
      margin-top: 8px;
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 14px;
      letter-spacing: 0.2em;
      color: #9c968c;
    }

    /* ── HERO ── */
    .hero {
      max-width: 1440px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 64px 2rem 72px;
      text-align: center;
      position: relative;
    }

    .hero h1 {
      font-family: 'El Messiri', sans-serif;
      font-weight: 400;
      font-size: 48px;
      line-height: 1.15;
      color: #fbefdc;
      letter-spacing: 0.01em;
    }

    .launching-label {
      margin-top: 24px;
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 36px;
      color: #fbefdc;
      letter-spacing: 0.05em;
    }

    /* ── COUNTDOWN ── */
    .countdown {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-top: 32px;
    }

    .countdown-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .countdown-box {
      width: 96px;
      height: 96px;
      border: 1px solid rgba(221,205,183,0.35);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 56px;
      color: #ddcdb7;
      background: rgba(255,255,255,0.03);
    }

    .countdown-label {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 24px;
      color: #ddcdb7;
      letter-spacing: 0.04em;
    }

    .countdown-sep {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 56px;
      color: #ddcdb7;
      margin-top: 20px;
      line-height: 1;
      opacity: 0.5;
    }

    /* book floating at bottom-right of hero */
    .hero-book {
      position: absolute;
      right: max(2rem, calc((100% - 1440px)/2 + 60px));
      bottom: -140px;
      width: clamp(260px, 28vw, 420px);
      z-index: 2;
      pointer-events: none;
    }

    .hero-book img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ── LOWER SECTION ── */
    .lower {
      background: #f1f1f1;
      position: relative;
    }

    .lower-inner {
      max-width: 1440px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      padding: 80px 2rem 80px;
      padding-right: max(2rem, calc((100% - 1440px)/2 + 60px + clamp(260px,28vw,420px) + 40px));
    }

    .notify-block {
      max-width: 520px;
    }

    .notify-block h2 {
      font-family: 'El Messiri', sans-serif;
      font-weight: 600;
      font-size: 36px;
      line-height: 1.25;
      color: #373635;
    }

    .form-row {
      margin-top: 32px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .form-row input[type="email"] {
      width: 100%;
      padding: 14px 24px;
      border: 1.5px solid rgba(55,54,53,0.3);
      border-radius: 999px;
      background: transparent;
      font-family: 'Jost', sans-serif;
      font-size: 16px;
      font-weight: 300;
      color: #373635;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-row input[type="email"]::placeholder { color: #9c968c; }
    .form-row input[type="email"]:focus { border-color: #373635; }

    .btn-notify {
      width: 100%;
      padding: 16px 24px;
      border: none;
      border-radius: 999px;
      background: #373635;
      color: #fbefdc;
      font-family: 'El Messiri', sans-serif;
      font-size: 26px;
      font-weight: 600;
      color: #d3c3af;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }

    .btn-notify:hover { background: #4f4b47; transform: translateY(-1px); }
    .btn-notify:active { transform: translateY(0); }

    .no-spam {
      margin-top: 12px;
      font-family: 'Jost', sans-serif;
      font-size: 14px;
      font-weight: 300;
      color: #9c968c;
    }

    .success-msg {
      display: none;
      margin-top: 16px;
      font-family: 'El Messiri', sans-serif;
      font-size: 20px;
      color: #373635;
    }

    /* ── FOOTER ── */
    footer {
      background: #373635;
      text-align: center;
      padding: 24px 2rem;
      font-family: 'Jost', sans-serif;
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: rgba(156,150,140,0.5);
      text-transform: uppercase;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .hero h1 { font-size: 36px; }
      .launching-label { font-size: 26px; }
      .countdown-box { width: 72px; height: 72px; font-size: 40px; }
      .countdown-label { font-size: 18px; }
      .countdown-sep { font-size: 40px; }

      .hero-book {
        position: relative;
        right: auto;
        bottom: auto;
        width: 80%;
        max-width: 340px;
        margin: 40px auto 0;
      }

      .hero { padding-bottom: 48px; }

      .lower-inner {
        padding-right: 2rem;
        flex-direction: column;
        gap: 40px;
      }

      .notify-block h2 { font-size: 28px; }
      .btn-notify { font-size: 20px; }
    }

    @media (max-width: 480px) {
      .hero h1 { font-size: 28px; }
      .launching-label { font-size: 20px; }
      .countdown-box { width: 60px; height: 60px; font-size: 32px; }
      .countdown-label { font-size: 14px; }
      .countdown-sep { font-size: 32px; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .pulse { animation: pulse 1s ease-in-out infinite; }
  </style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header>
  <div class="logo">
    <img src="SenseRevolt_Logo.svg" alt="SenseRevolt" />
  </div>
  <p class="tagline">One Ecosystem for the Whole Family</p>
</header>

<!-- ═══ HERO ═══ -->
<section class="hero">
  <h1>Something Meaningful is Coming</h1>
  <p class="launching-label">Launching in</p>

  <div class="countdown">
    <div class="countdown-unit">
      <div class="countdown-box" id="cd-days">00</div>
      <span class="countdown-label">Days</span>
    </div>
    <span class="countdown-sep">:</span>
    <div class="countdown-unit">
      <div class="countdown-box" id="cd-hours">00</div>
      <span class="countdown-label">Hours</span>
    </div>
    <span class="countdown-sep">:</span>
    <div class="countdown-unit">
      <div class="countdown-box" id="cd-mins">00</div>
      <span class="countdown-label">Min</span>
    </div>
    <span class="countdown-sep">:</span>
    <div class="countdown-unit">
      <div class="countdown-box pulse" id="cd-secs">00</div>
      <span class="countdown-label">Sec</span>
    </div>
  </div>

  <!-- книга висить між секціями -->
  <div class="hero-book">
    <img src="book-item.png" alt="SenseRevolt book" />
  </div>
</section>

<!-- ═══ LOWER ═══ -->
<section class="lower">
  <div class="lower-inner">
    <div class="notify-block">
      <h2>Be the First to Know<br>When We Launch</h2>
      <div class="form-row">
        <input type="email" id="email-input" placeholder="Your email address" />
        <button class="btn-notify" onclick="handleNotify()">Notify Me</button>
      </div>
      <p class="no-spam">No spam. Ever. Unsubscribe anytime.</p>
      <p class="success-msg" id="success-msg">✓ You're on the list!</p>
    </div>
  </div>
</section>

<!-- ═══ FOOTER ═══ -->
<footer>
  &copy; <span id="yr"></span> SenseRevolt &mdash; All rights reserved
</footer>

<script>
  document.getElementById('yr').textContent = new Date().getFullYear();

  // ── SET YOUR LAUNCH DATE ──
  const LAUNCH = new Date('2025-09-01T00:00:00');

  function pad(n) { return String(n).padStart(2, '0'); }

  function tick() {
    const diff = LAUNCH - Date.now();
    if (diff <= 0) {
      ['cd-days','cd-hours','cd-mins','cd-secs'].forEach(id => document.getElementById(id).textContent = '00');
      return;
    }
    document.getElementById('cd-days').textContent  = pad(Math.floor(diff / 86400000));
    document.getElementById('cd-hours').textContent = pad(Math.floor((diff % 86400000) / 3600000));
    document.getElementById('cd-mins').textContent  = pad(Math.floor((diff % 3600000) / 60000));
    document.getElementById('cd-secs').textContent  = pad(Math.floor((diff % 60000) / 1000));
  }
  tick();
  setInterval(tick, 1000);

  function handleNotify() {
    const input = document.getElementById('email-input');
    const msg = document.getElementById('success-msg');
    const val = input.value.trim();
    if (!val || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) {
      input.style.borderColor = '#c0392b';
      input.focus();
      setTimeout(() => input.style.borderColor = '', 1800);
      return;
    }
    console.log('Subscribe:', val);
    input.style.display = 'none';
    document.querySelector('.btn-notify').style.display = 'none';
    document.querySelector('.no-spam').style.display = 'none';
    msg.style.display = 'block';
  }

  document.getElementById('email-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleNotify();
  });
</script>
</body>
</html>
