<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SenseRevolt | Something Meaningful is Coming</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400;600&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Jost', sans-serif;
            background-color: #f1f1f1;
            color: #373635;
            overflow-x: hidden;
        }

        .hero-section {
            background-color: #373635;
            text-align: center;
            padding: 60px 20px 200px 20px;
            position: relative;
        }

        .logo {
            max-width: 436px;
            width: 100%;
            height: auto;
            margin-bottom: 60px;
        }

        .main-title {
            font-family: 'El Messiri', sans-serif;
            font-weight: 400;
            font-size: 48px;
            color: #fbefdc;
            margin-bottom: 30px;
        }

        .subtitle {
            font-family: 'Jost', sans-serif;
            font-weight: 300;
            font-size: 36px;
            color: #fbefdc;
            margin-bottom: 40px;
        }

        .countdown-wrapper {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .time-block {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .box {
            border: 1px solid rgba(221, 205, 183, 0.3);
            border-radius: 4px;
            width: 100px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
        }

        .number {
            font-family: 'Jost', sans-serif;
            font-weight: 200;
            font-size: 56px;
            color: #ddcdb7;
            line-height: 1;
        }

        .label {
            font-family: 'Jost', sans-serif;
            font-weight: 300;
            font-size: 24px;
            color: #fbefdc;
        }

        .colon {
            font-family: 'Jost', sans-serif;
            font-weight: 200;
            font-size: 56px;
            color: #ddcdb7;
            line-height: 100px;
        }

        .bottom-section {
            background-color: #f1f1f1;
            padding: 0 20px 100px 20px;
            position: relative;
            display: flex;
            justify-content: center;
        }

        .content-container {
            max-width: 1200px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            position: relative;
        }

        .form-wrapper {
            flex: 1;
            max-width: 500px;
            padding-top: 80px;
            text-align: center;
            z-index: 2;
        }

        .form-title {
            font-family: 'El Messiri', sans-serif;
            font-weight: 600;
            font-size: 36px;
            color: #373635;
            margin-bottom: 30px;
            line-height: 1.2;
        }

        .email-input {
            width: 100%;
            background-color: transparent;
            border: 1px solid #373635;
            border-radius: 50px;
            padding: 18px 30px;
            font-family: 'Jost', sans-serif;
            font-size: 16px;
            color: #373635;
            margin-bottom: 20px;
            outline: none;
        }
        
        .email-input::placeholder {
            color: #666;
        }

        .submit-btn {
            width: 100%;
            background-color: #373635;
            color: #d3c3af;
            border: none;
            border-radius: 50px;
            padding: 15px 30px;
            font-family: 'El Messiri', sans-serif;
            font-weight: 600;
            font-size: 26px;
            cursor: pointer;
            transition: opacity 0.3s ease;
            margin-bottom: 15px;
        }

        .submit-btn:hover {
            opacity: 0.9;
        }

        .spam-notice {
            font-family: 'Jost', sans-serif;
            font-size: 14px;
            color: #373635;
        }

        .books-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: flex-end;
            margin-top: -200px;
            z-index: 10;
        }

        .books-img {
            max-width: 100%;
            width: 600px;
            height: auto;
            filter: drop-shadow(-10px 15px 25px rgba(0,0,0,0.15));
        }

        @media (max-width: 992px) {
            .content-container {
                flex-direction: column;
                align-items: center;
            }
            
            .books-wrapper {
                margin-top: 40px;
                justify-content: center;
            }
            
            .hero-section {
                padding-bottom: 80px;
            }
            
            .form-wrapper {
                padding-top: 40px;
            }
        }

        @media (max-width: 600px) {
            .main-title { font-size: 36px; }
            .subtitle { font-size: 28px; }
            .number { font-size: 40px; }
            .box { width: 70px; height: 70px; }
            .colon { font-size: 40px; line-height: 70px; }
            .label { font-size: 18px; }
            .form-title { font-size: 28px; }
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <img src="assets/Logo.svg" alt="SenseRevolt Logo" class="logo">
        
        <h1 class="main-title">Something Meaningful is Coming</h1>
        <h2 class="subtitle">Launching in</h2>
        
        <div class="countdown-wrapper">
            <div class="time-block">
                <div class="box"><span class="number" id="days">30</span></div>
                <span class="label">Days</span>
            </div>
            <span class="colon">:</span>
            <div class="time-block">
                <div class="box"><span class="number" id="hours">00</span></div>
                <span class="label">Hours</span>
            </div>
            <span class="colon">:</span>
            <div class="time-block">
                <div class="box"><span class="number" id="minutes">00</span></div>
                <span class="label">Min</span>
            </div>
            <span class="colon">:</span>
            <div class="time-block">
                <div class="box"><span class="number" id="seconds">00</span></div>
                <span class="label">Sec</span>
            </div>
        </div>
    </section>

    <section class="bottom-section">
        <div class="content-container">
            <div class="form-wrapper">
                <h3 class="form-title">Be the First to Know<br>When We Launch</h3>
                <form action="#" method="POST">
                    <input type="email" class="email-input" placeholder="Your email address" required>
                    <button type="submit" class="submit-btn">Notify Me</button>
                </form>
                <p class="spam-notice">No spam. Ever. Unsubscribe anytime.</p>
            </div>

            <div class="books-wrapper">
                <img src="assets/books.png" alt="SenseRevolt Books" class="books-img">
            </div>
        </div>
    </section>

    <script>
        const launchDate = new Date("Jun 7, 2026 00:00:00").getTime();

        const timer = setInterval(function() {
            const now = new Date().getTime();
            const distance = launchDate - now;

            let days = Math.floor(distance / (1000 * 60 * 60 * 24));
            let hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            let minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            let seconds = Math.floor((distance % (1000 * 60)) / 1000);

            days = days < 10 ? "0" + days : days;
            hours = hours < 10 ? "0" + hours : hours;
            minutes = minutes < 10 ? "0" + minutes : minutes;
            seconds = seconds < 10 ? "0" + seconds : seconds;

            document.getElementById("days").innerText = days;
            document.getElementById("hours").innerText = hours;
            document.getElementById("minutes").innerText = minutes;
            document.getElementById("seconds").innerText = seconds;

            if (distance < 0) {
                clearInterval(timer);
                document.getElementById("days").innerText = "00";
                document.getElementById("hours").innerText = "00";
                document.getElementById("minutes").innerText = "00";
                document.getElementById("seconds").innerText = "00";
            }
        }, 1000);
    </script>
</body>
</html>
